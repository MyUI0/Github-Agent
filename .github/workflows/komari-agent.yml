name: Komari Agent (Hourly 25min Run)

# 触发规则：每小时整点触发 + 手动触发
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# 任务定义（核心）
jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      # 步骤1：拉取仓库代码（含二进制文件）
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 步骤2：赋予二进制文件执行权限
      - name: 赋予执行权限
        run: chmod +x ./bin/komari-agent-linux-amd64

      # 步骤3：运行Agent并优先输出日志（核心排查步骤）
      - name: 运行Komari Agent（优先输出日志）
        env:
          KOMARI_TOKEN: ${{ secrets.KOMARI_TOKEN }}
          KOMARI_SERVER: ${{ secrets.KOMARI_SERVER }}
        run: |
          # 前置检查
          echo "=== 前置检查 ==="
          if [ ! -f ./bin/komari-agent-linux-amd64 ]; then
            echo "错误：二进制文件 ./bin/komari-agent 不存在！"
            exit 1
          fi
          echo "KOMARI_SERVER: $KOMARI_SERVER"
          echo "KOMARI_TOKEN: ${KOMARI_TOKEN:0:5}***"
          if [ ! -x ./bin/komari-agent-linux-amd64 ]; then
            echo "重新赋权..."
            chmod +x ./bin/komari-agent-linux-amd64
          fi

          # 启动Agent并立即输出日志
          echo -e "\n=== 启动Agent ==="
          > komari-run.log
          ./bin/komari-agent -e "$KOMARI_SERVER" -t "$KOMARI_TOKEN" \
            --disable-auto-update \
            --reconnect-interval 5 \
            --max-retries 99 > komari-run.log 2>&1 &
          AGENT_PID=$!
          echo "Agent PID: $AGENT_PID"

          # 立即输出初始日志（排查连接问题）
          echo -e "\n=== 初始日志（前30行） ==="
          sleep 3
          cat komari-run.log
          if [ ! -s komari-run.log ]; then
            echo "警告：日志为空！可能二进制架构不兼容。"
          fi

          # 运行25分钟
          echo -e "\n=== 运行25分钟 ==="
          tail -f komari-run.log &
          TAIL_PID=$!
          sleep 1500

          # 停止进程并输出完整日志
          echo -e "\n=== 终止进程 ==="
          kill $TAIL_PID 2>/dev/null || true
          kill $AGENT_PID 2>/dev/null || true
          pkill -f "komari-agent" 2>/dev/null || true

          echo -e "\n=== 完整日志 ==="
          cat komari-run.log
        shell: /usr/bin/bash -e {0}
